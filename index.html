<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创意作品集</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo">
                    <span class="logo-text">作品集</span>
                </a>
            <div class="nav-menu" id="navMenu">
                <a href="#home" class="nav-link active">首页</a>
                <a href="#interior" class="nav-link">室内效果</a>
                <a href="#comfui" class="nav-link">ComfUI</a>
                <button id="exportImages" class="nav-link export-btn" style="background: none; border: none; cursor: pointer;">导出图片</button>
            </div>
            <div class="nav-toggle" id="navToggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <!-- 首页 Hero 区域 -->
    <section id="home" class="hero">
        <div class="hero-content">
            <div class="hero-text">

                <h1 class="hero-title">
                    <span class="greeting">你好，我是</span>
                    <span class="name">赵卫迪</span>
                </h1>
                <p class="hero-subtitle">毕业于广西民族大学相思湖学院</p>
                <p class="hero-description">专注于室内设计与UI创作，热爱创造美好的数字体验</p>
                <div class="hero-buttons">
                    <a href="#interior" class="btn btn-primary">室内效果</a>
                    <a href="#comfui" class="btn btn-secondary">ComfUI</a>
                </div>
            </div>
            <div class="hero-visual">
                <div class="floating-shapes">
                    <div class="shape shape-1"></div>
                    <div class="shape shape-2"></div>
                    <div class="shape shape-3"></div>
                    <div class="shape shape-4"></div>
                </div>
            </div>
        </div>
        <div class="scroll-indicator">
            <div class="mouse">
                <div class="wheel"></div>
            </div>
            <span>向下滚动</span>
        </div>
    </section>

    <!-- 室内效果图展示 -->
    <section id="interior" class="interior">
        <div class="container">
            <div class="section-header">
                <span class="section-tag">室内效果</span>
                <h2 class="section-title">空间设计作品</h2>
            </div>
            
            <!-- 西北旺效果图展示 -->
            <div class="interior-project">
                <h3 class="project-title">西北旺效果图展示</h3>
                <div class="project-info">
                    <p>室内设计 | 2026</p>
                    <div class="upload-section">
                        <input type="file" id="upload-1" class="file-input" accept="image/*" multiple>
                        <label for="upload-1" class="upload-btn">上传图片</label>
                        <button id="save-1" class="save-btn">保存</button>
                    </div>
                </div>
                <div class="project-gallery" id="project-1">
                    <!-- 图片将在这里动态添加 -->
                </div>
            </div>
            
            <!-- 孔雀城大湖天玺 -->
            <div class="interior-project">
                <h3 class="project-title">孔雀城大湖天玺</h3>
                <div class="project-info">
                    <p>室内设计 | 2026</p>
                    <div class="upload-section">
                        <input type="file" id="upload-2" class="file-input" accept="image/*" multiple>
                        <label for="upload-2" class="upload-btn">上传图片</label>
                        <button id="add-2" class="add-btn">添加图片</button>
                        <button id="save-2" class="save-btn">保存</button>
                    </div>
                </div>
                <div class="project-gallery" id="project-2">
                    <!-- 图片将在这里动态添加 -->
                </div>
            </div>
            
            <!-- 燕西华府 -->
            <div class="interior-project">
                <h3 class="project-title">燕西华府</h3>
                <div class="project-info">
                    <p>室内设计 | 2026</p>
                    <div class="upload-section">
                        <input type="file" id="upload-3" class="file-input" accept="image/*" multiple>
                        <label for="upload-3" class="upload-btn">上传图片</label>
                        <button id="add-3" class="add-btn">添加图片</button>
                        <button id="save-3" class="save-btn">保存</button>
                    </div>
                </div>
                <div class="project-gallery" id="project-3">
                    <!-- 图片将在这里动态添加 -->
                </div>
            </div>
            

        </div>
    </section>

    <!-- ComfUI 使用板块 -->
    <section id="comfui" class="comfui">
        <div class="container">
            <div class="section-header">
                <span class="section-tag">ComfUI</span>
                <h2 class="section-title">图片展示</h2>
            </div>
            <div class="comfui-content">
                <div class="pdf-upload-section">
                    <h3>上传图片</h3>
                    <div class="upload-section">
                        <input type="file" id="upload-comfui" class="file-input" accept="image/*" multiple>
                        <label for="upload-comfui" class="upload-btn">上传图片</label>
                        <button id="add-comfui" class="add-btn">添加图片</button>
                        <button id="save-comfui" class="save-btn">保存</button>
                    </div>
                </div>
                <div class="pdf-viewer-section">
                    <h3>图片预览</h3>
                    <div class="project-gallery" id="comfui-gallery">
                        <!-- 图片将在这里动态添加 -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <span class="logo-text">作品集</span>
                    <p>创造美好的数字体验</p>
                </div>
                <div class="footer-social">
                    <a href="#" class="social-link" aria-label="GitHub">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                    </a>
                    <a href="#" class="social-link" aria-label="LinkedIn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                        </svg>
                    </a>
                    <a href="#" class="social-link" aria-label="Twitter">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/>
                        </svg>
                    </a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 作品集. 保留所有权利。</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
